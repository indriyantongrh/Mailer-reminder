name: Add Test User & Send Reminder

on:
  workflow_dispatch:

jobs:
  test-reminder:
    name: Add Test User and Send Reminder Email
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Add test user to Firestore
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node add-test-user.js

      - name: Run subscription reminder script
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node subscription-reminder.js
